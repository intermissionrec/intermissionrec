<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../assets/head.js"></script>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body class="contacts">
  <div class="page">
    <div data-include="../components/header.html"></div>

    <main>
      <section class="content-section" id="contacts" style="padding: 0;">
        <div class="contacts-centered">

          <a class="contact-row" href="mailto:info@intermissionrec.com">
            <span class="contact-icon">
              <!-- Envelope SVG -->
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M2 7l10 7 10-7"/>
              </svg>
            </span>
            <span class="contact-text">
              <span class="contact-label">E-mail:</span>
              <span class="contact-handle">info@intermissionrec.com</span>
            </span>
          </a>

          <a class="contact-row" href="https://instagram.com/intermissionrecords" target="_blank" rel="noopener noreferrer">
            <span class="contact-icon">
              <!-- Instagram SVG -->
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5"></rect>
                <circle cx="12" cy="12" r="5"></circle>
                <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle>
              </svg>
            </span>
            <span class="contact-text">
              <span class="contact-label">Instagram:</span>
              <span class="contact-handle">@intermissionrecords</span>
            </span>
          </a>

          <a class="contact-row"
             href="https://youtube.com/@INTERMISSIONREC"
             target="_blank"
             rel="noopener noreferrer">
            <span class="contact-icon">
              <!-- YouTube SVG -->
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="5" width="20" height="14" rx="4"/>
                <polygon points="10,9 16,12 10,15" fill="currentColor" stroke="none"/>
              </svg>
            </span>
            <span class="contact-text">
              <span class="contact-label">YouTube:</span>
              <span class="contact-handle">@INTERMISSIONREC</span>
            </span>
          </a>

        </div>
      </section>
    </main>

    <div data-include="../components/footer.html"></div>
  </div>

  <script src="../assets/script.js" defer></script>
</body>
</html>
