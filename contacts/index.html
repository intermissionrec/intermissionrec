<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <title>INTER(MISSION) | Контакти</title>
  <meta name="description" content="Слушай цялата музика на INTER(MISSION)">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://intermissionrec.com/contacts/">
  <meta property="og:title" content="INTER(MISSION) — Контакти">
  <meta property="og:description" content="INTER(MISSION) — Контакти">
  <meta property="og:image" content="https://intermissionrec.com/assets/images/social/social-20260724234201.png">
  <meta property="og:locale" content="bg_BG">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="INTER(MISSION) — Контакти">
  <meta name="twitter:description" content="INTER(MISSION) — Контакти">
  <meta name="twitter:image" content="https://intermissionrec.com/assets/images/social/social-20260724234201.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../assets/head.js"></script>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body class="contacts">
  <div class="page">
    <div data-include="../components/header.html"></div>

    <main>
      <section class="content-section" id="contacts" style="padding: 0;">
        <div class="contacts-columns">

          <div class="contacts-centered">

            <a class="contact-row" href="mailto:info@intermissionrec.com">
              <span class="contact-icon">
                <!-- Envelope SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="M2 7l10 7 10-7"/>
                </svg>
              </span>
              <span class="contact-text">
                <span class="contact-label">E-mail:</span>
                <span class="contact-handle">info@intermissionrec.com</span>
              </span>
            </a>

            <a class="contact-row" href="https://instagram.com/intermissionrecords" target="_blank" rel="noopener noreferrer">
              <span class="contact-icon">
                <!-- Instagram SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="2" width="20" height="20" rx="5"></rect>
                  <circle cx="12" cy="12" r="5"></circle>
                  <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle>
                </svg>
              </span>
              <span class="contact-text">
                <span class="contact-label">Instagram:</span>
                <span class="contact-handle">@intermissionrecords</span>
              </span>
            </a>

            <a class="contact-row"
               href="https://youtube.com/@INTERMISSIONREC"
               target="_blank"
               rel="noopener noreferrer">
              <span class="contact-icon">
                <!-- YouTube SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="5" width="20" height="14" rx="4"/>
                  <polygon points="10,9 16,12 10,15" fill="currentColor" stroke="none"/>
                </svg>
              </span>
              <span class="contact-text">
                <span class="contact-label">YouTube:</span>
                <span class="contact-handle">@INTERMISSIONREC</span>
              </span>
            </a>

          </div>

          <div class="contact-form-wrap">
            <h2>Изпрати съобщение</h2>
            <form id="contactForm"
                  action="https://contact-form-mailer.alexvidrata.workers.dev"
                  method="POST"
                  target="hidden_iframe"
                  class="contact-form">
              <input type="text" name="name" placeholder="Име" required>
              <input type="email" name="email" placeholder="Имейл" required>
              <textarea name="message" rows="5" placeholder="Съобщение" required></textarea>

              <!-- Honeypot field - hidden from real users, bots usually fill it anyway -->
              <input type="text" name="website" style="position:absolute; left:-9999px;" tabindex="-1" autocomplete="off">
              <input type="hidden" name="startTime" id="startTime" value="">

              <button type="submit" class="platform-link" id="submitBtn" style="width: 100%; border: none; cursor: pointer;">
                Изпрати
              </button>
              <p id="formStatus" class="section-lead" style="margin-top: 12px; margin-bottom: 0; display: none;"></p>
            </form>
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
          </div>

        </div>
      </section>
    </main>

    <div data-include="../components/footer.html"></div>
  </div>

  <script src="../assets/script.js" defer></script>
  <script>
    document.getElementById('startTime').value = Date.now();

    var submitBtn = document.getElementById('submitBtn');
    var originalBtnText = submitBtn.textContent;
    var formStatus = document.getElementById('formStatus');
    var resetTimer = null;

    function resetButton() {
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
      submitBtn.style.cursor = 'pointer';
      submitBtn.textContent = originalBtnText;
      if (resetTimer) {
        clearTimeout(resetTimer);
        resetTimer = null;
      }
    }

    document.getElementById('contactForm').addEventListener('submit', function () {
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.6';
      submitBtn.style.cursor = 'default';
      submitBtn.innerHTML = '<span class="btn-spinner"></span> Изпращане...';
      formStatus.style.display = 'none';

      // Safety net: force a reset after 12 seconds no matter what, in case
      // the Worker's response never arrives at all (network failure, etc.)
      resetTimer = setTimeout(function () {
        resetButton();
        formStatus.textContent = 'Съобщението не бе изпратено (изтече времето на изчакване) - опитай отново или ни пиши директно на info@intermissionrec.com.';
        formStatus.style.color = '#e05a4e';
        formStatus.style.display = 'block';
      }, 12000);
    });

    // The Worker's response is a tiny page that posts the real result back
    // to us - this is how we know success vs failure, since we can't read
    // the iframe's content directly (it's a different domain).
    window.addEventListener('message', function (event) {
      if (!event.data || event.data.type !== 'contactFormResult') return;

      resetButton();

      if (event.data.success) {
        document.getElementById('contactForm').reset();
        formStatus.textContent = 'Благодарим ти! Съобщението е изпратено.';
        formStatus.style.color = '';
        formStatus.style.display = 'block';
      } else {
        formStatus.textContent = 'Нещо се обърка: ' + (event.data.error || 'моля опитай отново') + ' - или пиши директно на info@intermissionrec.com.';
        formStatus.style.color = '#e05a4e';
        formStatus.style.display = 'block';
      }
    });
  </script>
</body>
</html>
